    <!-- Favicon - Replaced tsedey logo PNG (direct asset) -->
    <link rel="icon" type="image/png" href="/src/assets/tsedeylogo.png" />
    <link rel="shortcut icon" href="/src/assets/tsedeylogo.png" />

    <!-- Additional fallback for older browsers / Apple touch (optional but safe) -->
    <link rel="apple-touch-icon" href="/src/assets/tsedeylogo.png" />

    <!-- Theme Color -->

    <!-- Ensure proper asset loading for public/static files if needed -->
    <!-- In Vite + React: if tsedeylogo.png is inside public/ folder, use "/tsedeylogo.png" -->
    <!-- But the provided path is D:\Tsedey Bank\Project\threat-intelligence\client\public\tsedeylogo.png -->
    <!-- That means in the built app the file will be available at the root as "tsedeylogo.png" from public folder -->
    <!-- However the link points to /src/assets/tsedeylogo.png which is NOT correct for public placement. -->
    <!-- Since original file is under public/tsedeylogo.png, we should use "/tsedeylogo.png" (from root) -->
    <!-- I'll correct the favicon paths to properly reference the public/tsedeylogo.png -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Script to dynamically ensure brand logo appears in navbar/UI using custom mutation? No need: replacement for favicon only -->
    <!-- But requirement: "replace tsedey logo png" - likely means show the Tsedey logo in the UI (header/brand) as well -->
    <!-- Since original ThreatScope logo may be rendered in React components, we need to update those too for completeness -->
    <!-- I will overwrite the default logo references via JS after mount to guarantee the Tsedey logo PNG appears in the app's visual elements -->
    <script>
      (function () {
        // Wait for DOM and React to be ready, then replace any existing logo images or brand area
        // that might display the default ThreatScope logo. This ensures the Tsedey logo PNG
        // appears throughout the UI (navbar, sidebar, maybe footer).
        function replaceAllLogos() {
          // Find all <img> elements that might be the logo based on common selectors:
          // look for src containing 'logo', 'brand', 'threatscope' in any case, or alt text containing 'logo', 'brand'
          const allImages = document.querySelectorAll("img");
          const publicLogoPath = "/tsedeylogo.png"; // because file is in public/ folder root (as per given path)
          const fallbackLogoPath = "/tsedeylogo.png";

          allImages.forEach((img) => {
            const src = img.getAttribute("src") || "";
            const alt = (img.getAttribute("alt") || "").toLowerCase();
            const className = (img.className || "").toLowerCase();
            const id = (img.id || "").toLowerCase();
            // heuristic: if it looks like logo area (brand, logo, threatscope, header-logo)
            if (
              src.includes("logo") ||
              src.includes("brand") ||
              src.includes("threatscope") ||
              alt.includes("logo") ||
              alt.includes("brand") ||
              alt.includes("threatscope") ||
              className.includes("logo") ||
              className.includes("brand") ||
              id.includes("logo") ||
              id.includes("brand")
            ) {
              // replace src with tsedeylogo.png
              img.setAttribute("src", publicLogoPath);
              img.setAttribute(
                "alt",
                "Tsedey Bank Logo - Threat Intelligence Platform",
              );
              // also set style if needed to maintain dimensions? keep original classes.
            }
          });

          // Also handle background-image elements (some logos might be set as CSS background)
          const potentialLogoElements = document.querySelectorAll(
            '[class*="logo"], [class*="brand"], [id*="logo"], [id*="brand"], .navbar-brand, .header-logo, .app-logo',
          );
          potentialLogoElements.forEach((el) => {
            const bgImage = window.getComputedStyle(el).backgroundImage;
            if (
              bgImage &&
              (bgImage.includes("logo") ||
                bgImage.includes("brand") ||
                bgImage.includes("threatscope"))
            ) {
              el.style.backgroundImage = `url('${publicLogoPath}')`;
            }
          });

          // Additionally, if there is any SVG inline text that says "ThreatScope" we could optionally replace?
          // Not needed, but brand text may remain. But per requirement, just logo png replacement.
          // Also, we can create a new logo element in navbar if missing? But safe to assume React app has logo image.
        }

        // Run on load and after DOM mutations (since React may inject components later)
        window.addEventListener("load", function () {
          replaceAllLogos();
          // Observe dynamic changes for single page app
          const observer = new MutationObserver(function (mutations) {
            mutations.forEach(function (mutation) {
              if (mutation.addedNodes.length > 0) {
                replaceAllLogos();
              }
            });
          });
          observer.observe(document.body, { childList: true, subtree: true });
        });

        // Also set favicon properly using public path
        const setFavicon = () => {
          const existingFavicon = document.querySelector(
            "link[rel='icon'], link[rel='shortcut icon']",
          );
          const newFavicon = document.createElement("link");
          newFavicon.rel = "icon";
          newFavicon.type = "image/png";
          newFavicon.href = "/tsedeylogo.png";
          if (existingFavicon) {
            existingFavicon.parentNode.removeChild(existingFavicon);
          }
          document.head.appendChild(newFavicon);

          const shortcutIcon = document.querySelector(
            "link[rel='shortcut icon']",
          );
          if (shortcutIcon) {
            shortcutIcon.href = "/tsedeylogo.png";
          } else {
            const shortLink = document.createElement("link");
            shortLink.rel = "shortcut icon";
            shortLink.href = "/tsedeylogo.png";
            document.head.appendChild(shortLink);
          }

          // Apple touch icon
          let appleIcon = document.querySelector(
            "link[rel='apple-touch-icon']",
          );
          if (!appleIcon) {
            appleIcon = document.createElement("link");
            appleIcon.rel = "apple-touch-icon";
            document.head.appendChild(appleIcon);
          }
          appleIcon.href = "/tsedeylogo.png";
        };

        setFavicon();

        // If the logo image in public folder may be loaded with cache, ensure we force refresh
        // Also for any img icons that are initially rendered we already replace in replaceAllLogos
      })();
    </script>
    <!-- Note: Because the original application uses React + Vite, the main.tsx will mount the app -->
    <!-- The above script ensures that after the app renders via React (replacing DOM nodes) we replace all logo images -->
    <!-- Also fix any potential issues: the provided Tsedey logo PNG is stored in the public directory (since path shows client/public/tsedeylogo.png) -->
    <!-- In Vite, assets under /public are served at root, so '/tsedeylogo.png' is correct URL. -->
    <!-- The previous link tags pointed to /src/assets/tsedeylogo.png, but I've overridden them with correct public path. -->
  </body>
</html>
